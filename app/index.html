<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriMart — Farmer Machinery Store</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial;background:#f4f7f0;color:#222}

/* HEADER */
.header{background:#27500A;color:#fff;padding:15px 30px;display:flex;justify-content:space-between}
.cart-btn{background:#639922;color:#fff;border:none;padding:10px;border-radius:6px;cursor:pointer}

/* NAV */
.nav{background:#3B6D11;padding:10px}
.nav button{background:none;border:none;color:#C0DD97;margin-right:10px;cursor:pointer}

/* PRODUCTS */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:20px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:15px}
.price{color:#27500A;font-weight:bold}
.add-btn{width:100%;background:#639922;color:#fff;border:none;padding:10px;margin-top:10px;cursor:pointer}
</style>
</head>

<body>

<header class="header">
<h2>🌱 AgriMart</h2>
<button class="cart-btn">Cart (<span id="cart-count">0</span>)</button>
</header>

<nav class="nav">
<button onclick="filterCat('all')">All</button>
<button onclick="filterCat('tractors')">Tractors</button>
<button onclick="filterCat('harvesting')">Harvesting</button>
<button onclick="filterCat('tillage')">Tillage</button>
<button onclick="filterCat('irrigation')">Irrigation</button>
<button onclick="filterCat('spraying')">Spraying</button>
<button onclick="filterCat('planting')">Planting</button>
<button onclick="filterCat('transport')">Transport</button>
<button onclick="filterCat('processing')">Processing</button>
</nav>

<div class="products-grid" id="grid"></div>

<script>
const products = [

{ id:1, name:'Mahindra Tractor', cat:'tractors', price:685000, img:'https://source.unsplash.com/400x300/?tractor,farm' },

{ id:2, name:'John Deere Tractor', cat:'tractors', price:890000, img:'https://source.unsplash.com/400x300/?agriculture,tractor' },

{ id:5, name:'Combine Harvester', cat:'harvesting', price:2400000, img:'https://source.unsplash.com/400x300/?combine,harvester' },

{ id:9, name:'Drip Irrigation Kit', cat:'irrigation', price:85000, img:'https://source.unsplash.com/400x300/?drip,irrigation' },

{ id:12, name:'Rotavator', cat:'tillage', price:78000, img:'https://source.unsplash.com/400x300/?plough,tractor' },

{ id:16, name:'Power Sprayer', cat:'spraying', price:12500, img:'https://source.unsplash.com/400x300/?agriculture,sprayer' },

{ id:18, name:'Seed Drill', cat:'planting', price:68000, img:'https://source.unsplash.com/400x300/?seed,drill,farm' },

{ id:21, name:'Mouldboard Plough', cat:'tillage', price:42000, img:'https://source.unsplash.com/400x300/?ploughing,field' },

{ id:22, name:'Laser Land Leveler', cat:'tillage', price:350000, img:'https://source.unsplash.com/400x300/?land,leveling,farm' },

{ id:23, name:'Square Baler', cat:'harvesting', price:780000, img:'https://source.unsplash.com/400x300/?hay,baler' },

{ id:24, name:'Round Baler', cat:'harvesting', price:950000, img:'https://source.unsplash.com/400x300/?round,baler' },

{ id:25, name:'Fertilizer Spreader', cat:'spraying', price:18000, img:'https://source.unsplash.com/400x300/?fertilizer,spreader' },

{ id:27, name:'Power Weeder', cat:'tillage', price:48000, img:'https://source.unsplash.com/400x300/?weeder,farm' },

{ id:28, name:'Tractor Trailer', cat:'transport', price:220000, img:'https://source.unsplash.com/400x300/?tractor,trailer' },

{ id:29, name:'Front Loader', cat:'tractors', price:310000, img:'https://source.unsplash.com/400x300/?front,loader' },

{ id:30, name:'Post Hole Digger', cat:'tillage', price:65000, img:'https://source.unsplash.com/400x300/?post,hole,digger' },

{ id:31, name:'Mulcher', cat:'tillage', price:145000, img:'https://source.unsplash.com/400x300/?mulcher,farm' },

{ id:32, name:'Silage Machine', cat:'harvesting', price:275000, img:'https://source.unsplash.com/400x300/?silage,tractor' },

{ id:33, name:'Mini Rice Mill', cat:'processing', price:120000, img:'https://source.unsplash.com/400x300/?rice,mill' },

{ id:34, name:'Oil Expeller', cat:'processing', price:98000, img:'https://source.unsplash.com/400x300/?oil,press,machine' },

{ id:35, name:'Chaff Cutter', cat:'processing', price:25000, img:'https://source.unsplash.com/400x300/?chaff,cutter' }

];



let cart = {};
let current = 'all';

function filterCat(cat){
current = cat;
render();
}

function render(){
let list = products.filter(p => current==='all'||p.cat===current);

document.getElementById('grid').innerHTML = list.map(p=>`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p class="price">₹${p.price.toLocaleString()}</p>
<button class="add-btn" onclick="add(${p.id})">Add to Cart</button>
</div>
</div>
`).join('');
}

function add(id){
cart[id]=(cart[id]||0)+1;
document.getElementById('cart-count').innerText=Object.values(cart).reduce((a,b)=>a+b,0);
}

render();

</script>

</body>
</html>
