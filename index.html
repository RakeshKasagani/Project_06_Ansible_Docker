<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriMart — Farmer Machinery Store</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial;background:#f4f7f0;color:#222}

/* HEADER */
.header{background:#27500A;color:#fff;padding:15px 30px;display:flex;justify-content:space-between}
.cart-btn{background:#639922;color:#fff;border:none;padding:10px;border-radius:6px;cursor:pointer}

/* NAV */
.nav{background:#3B6D11;padding:10px}
.nav button{background:none;border:none;color:#C0DD97;margin-right:10px;cursor:pointer}

/* PRODUCTS */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:20px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:15px}
.price{color:#27500A;font-weight:bold}
.add-btn{width:100%;background:#639922;color:#fff;border:none;padding:10px;margin-top:10px;cursor:pointer}
</style>
</head>

<body>

<header class="header">
<h2>🌱 AgriMart</h2>
<button class="cart-btn">Cart (<span id="cart-count">0</span>)</button>
</header>

<nav class="nav">
<button onclick="filterCat('all')">All</button>
<button onclick="filterCat('tractors')">Tractors</button>
<button onclick="filterCat('harvesting')">Harvesting</button>
<button onclick="filterCat('tillage')">Tillage</button>
<button onclick="filterCat('irrigation')">Irrigation</button>
<button onclick="filterCat('spraying')">Spraying</button>
<button onclick="filterCat('planting')">Planting</button>
<button onclick="filterCat('transport')">Transport</button>
<button onclick="filterCat('processing')">Processing</button>
</nav>

<div class="products-grid" id="grid"></div>

<script>

const products = [

/* EXISTING + NEW WITH IMAGES */

{ id:1, name:'Mahindra Tractor', cat:'tractors', price:685000, img:'https://images.unsplash.com/photo-1598514983318-2f64f8f4796c' },
{ id:2, name:'John Deere Tractor', cat:'tractors', price:890000, img:'https://images.unsplash.com/photo-1501004318641-b39e6451bec6' },

{ id:5, name:'Combine Harvester', cat:'harvesting', price:2400000, img:'https://images.unsplash.com/photo-1560493676-04071c5f467b' },

{ id:9, name:'Drip Irrigation Kit', cat:'irrigation', price:85000, img:'https://images.unsplash.com/photo-1502082553048-f009c37129b9' },

{ id:12, name:'Rotavator', cat:'tillage', price:78000, img:'https://images.unsplash.com/photo-1600585154526-990dced4db0d' },

{ id:16, name:'Power Sprayer', cat:'spraying', price:12500, img:'https://images.unsplash.com/photo-1595433562696-14f7c1d0c43b' },

{ id:18, name:'Seed Drill', cat:'planting', price:68000, img:'https://images.unsplash.com/photo-1523741543316-beb7fc7023d8' },

/* NEW ITEMS */

{ id:21, name:'Mouldboard Plough', cat:'tillage', price:42000, img:'https://images.unsplash.com/photo-1589927986089-35812388d1f4' },

{ id:22, name:'Laser Land Leveler', cat:'tillage', price:350000, img:'https://images.unsplash.com/photo-1500937386664-56d1dfef3854' },

{ id:23, name:'Square Baler', cat:'harvesting', price:780000, img:'https://images.unsplash.com/photo-1592982537447-7440770cbfc9' },

{ id:24, name:'Round Baler', cat:'harvesting', price:950000, img:'https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc' },

{ id:25, name:'Fertilizer Spreader', cat:'spraying', price:18000, img:'https://images.unsplash.com/photo-1500595046743-ddf4d3d753fd' },

{ id:27, name:'Power Weeder', cat:'tillage', price:48000, img:'https://images.unsplash.com/photo-1501004318641-b39e6451bec6' },

{ id:28, name:'Tractor Trailer', cat:'transport', price:220000, img:'https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2' },

{ id:29, name:'Front Loader', cat:'tractors', price:310000, img:'https://images.unsplash.com/photo-1581091215367-59ab6b3d0f1f' },

{ id:30, name:'Post Hole Digger', cat:'tillage', price:65000, img:'https://images.unsplash.com/photo-1568605114967-8130f3a36994' },

{ id:31, name:'Mulcher', cat:'tillage', price:145000, img:'https://images.unsplash.com/photo-1500937386664-56d1dfef3854' },

{ id:32, name:'Silage Machine', cat:'harvesting', price:275000, img:'https://images.unsplash.com/photo-1574943320219-553eb213f72d' },

{ id:33, name:'Mini Rice Mill', cat:'processing', price:120000, img:'https://images.unsplash.com/photo-1586201375761-83865001e31c' },

{ id:34, name:'Oil Expeller', cat:'processing', price:98000, img:'https://images.unsplash.com/photo-1604908554027-e477d54d8dba' },

{ id:35, name:'Chaff Cutter', cat:'processing', price:25000, img:'https://images.unsplash.com/photo-1500595046743-ddf4d3d753fd' }

];

let cart = {};
let current = 'all';

function filterCat(cat){
current = cat;
render();
}

function render(){
let list = products.filter(p => current==='all'||p.cat===current);

document.getElementById('grid').innerHTML = list.map(p=>`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p class="price">₹${p.price.toLocaleString()}</p>
<button class="add-btn" onclick="add(${p.id})">Add to Cart</button>
</div>
</div>
`).join('');
}

function add(id){
cart[id]=(cart[id]||0)+1;
document.getElementById('cart-count').innerText=Object.values(cart).reduce((a,b)=>a+b,0);
}

render();

</script>

</body>
</html>
